<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potatoo — الفروع</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold-1:#FFCC44; --gold-2:#E08A00;
      --bg:#0E0E0E; --card:#1A1A1A; --item:#222;
      --border:#2E2E2E; --text:#FFF; --sub:rgba(255,255,255,0.5);
      --gold-grad:linear-gradient(180deg,#FFCC44,#E08A00);
      --red:#FF3B30; --green:#30D158;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    #topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(14,14,14,0.95);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0 20px;height:60px;display:flex;align-items:center;gap:12px;
    }
    .logo-sm{width:36px;height:36px;border-radius:10px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .topbar-title{font-size:18px;font-weight:900;flex:1;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .back-btn{padding:6px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;gap:6px;}
    .back-btn:hover{border-color:var(--gold-1);color:var(--gold-1);}

    .page-content{padding:20px 16px 100px;}

    /* ADD BRANCH FORM */
    .section-title{font-size:15px;font-weight:900;color:var(--gold-1);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;}
    .field input{width:100%;padding:12px 14px;background:#111;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--gold-1);}
    .field input::placeholder{color:rgba(255,255,255,0.2);}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .add-btn{width:100%;height:48px;border-radius:14px;border:none;background:var(--gold-grad);color:#000;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .add-btn:hover{opacity:0.9;}
    .add-btn:disabled{opacity:0.5;cursor:not-allowed;}

    /* ERROR/SUCCESS */
    .msg{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none;text-align:center;}
    .msg.show{display:block;}
    .msg.err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);color:var(--red);}
    .msg.ok{background:rgba(48,209,88,0.1);border:1px solid rgba(48,209,88,0.3);color:var(--green);}

    /* BRANCHES LIST */
    .branches-list{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
    .branch-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;align-items:center;gap:14px;animation:cardIn 0.3s ease both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .branch-icon{width:48px;height:48px;border-radius:14px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .branch-info{flex:1;min-width:0;}
    .branch-name-ar{font-size:15px;font-weight:900;}
    .branch-name-en{font-size:12px;color:var(--sub);}
    .branch-phone{font-size:12px;color:var(--gold-1);margin-top:4px;}
    .branch-address{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .del-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,59,48,0.3);background:rgba(255,59,48,0.1);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
    .del-btn:hover{background:rgba(255,59,48,0.25);}

    /* LOADER */
    .loader{display:flex;align-items:center;justify-content:center;padding:40px;gap:12px;}
    .spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold-1);border-radius:50%;animation:sp 0.8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    .empty{text-align:center;padding:40px;color:var(--sub);font-size:14px;font-weight:700;}

    /* NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,20,0.97);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(12px);z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--sub);font-size:10px;font-weight:700;gap:4px;transition:color 0.2s;}
    .nav-item.active{color:var(--gold-1);}
    .nav-icon{font-size:20px;}
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo-sm">🥔</div>
  <div class="topbar-title">الفروع</div>
  <button class="back-btn" onclick="doLogout()">خروج</button>
</div>

<div class="page-content">

  <!-- ADD FORM -->
  <div class="section-title">➕ إضافة فرع جديد</div>
  <div class="form-card">
    <div class="msg err" id="err-msg"></div>
    <div class="msg ok" id="ok-msg"></div>

    <div class="row-2">
      <div class="field">
        <label>الاسم بالعربي</label>
        <input id="f-ar" type="text" placeholder="فرع المعادي" />
      </div>
      <div class="field">
        <label>الاسم بالإنجليزي</label>
        <input id="f-en" type="text" placeholder="Maadi Branch" dir="ltr" />
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>رقم الهاتف</label>
        <input id="f-phone" type="tel" placeholder="01000000000" dir="ltr" />
      </div>
      <div class="field">
        <label>المدينة</label>
        <input id="f-city" type="text" placeholder="القاهرة" />
      </div>
    </div>
    <div class="field">
      <label>العنوان التفصيلي</label>
      <input id="f-address" type="text" placeholder="١٢ شارع الجمهورية، المعادي" />
    </div>
    <button class="add-btn" id="add-btn" onclick="addBranch()">إضافة الفرع</button>
  </div>

  <!-- LIST -->
  <div class="section-title" style="margin-top:24px;">🏪 الفروع الحالية</div>
  <div id="branches-list">
    <div class="loader"><div class="spin"></div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">📊</span>الرئيسية</a>
  <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>الطلبات</a>
  <a href="branches.html" class="nav-item active"><span class="nav-icon">🏪</span>الفروع</a>
  <a href="menu.html" class="nav-item"><span class="nav-icon">🍟</span>المنيو</a>
  <a href="stats.html" class="nav-item"><span class="nav-icon">📈</span>التقارير</a>
</nav>

<script>
const API = 'https://potatoo-eight.vercel.app/api'
const token = localStorage.getItem('pt_token')
if (!token) window.location.replace('./login.html')

async function loadBranches() {
  try {
    const res = await fetch(`${API}/branches`, { headers: { Authorization: `Bearer ${token}` } })
    if (res.status === 401) { doLogout(); return; }
    const json = await res.json()
    const branches = json.data || []
    const list = document.getElementById('branches-list')

    if (!branches.length) {
      list.innerHTML = '<div class="empty">لا يوجد فروع حتى الآن</div>'
      return
    }

    list.innerHTML = `<div class="branches-list">${branches.map(b => `
      <div class="branch-card" id="bc-${b._id}">
        <div class="branch-icon">🏪</div>
        <div class="branch-info">
          <div class="branch-name-ar">${b.arabicName || '—'}</div>
          <div class="branch-name-en">${b.englishName || '—'}</div>
          <div class="branch-phone">📞 ${b.phone || '—'}</div>
          <div class="branch-address">📍 ${b.address || ''} ${b.city ? '- ' + b.city : ''}</div>
        </div>
        <button class="del-btn" onclick="deleteBranch('${b._id}')">🗑</button>
      </div>
    `).join('')}</div>`
  } catch(e) {
    document.getElementById('branches-list').innerHTML = '<div class="empty">فشل التحميل</div>'
  }
}

async function addBranch() {
  const arabicName = document.getElementById('f-ar').value.trim()
  const englishName = document.getElementById('f-en').value.trim()
  const phone = document.getElementById('f-phone').value.trim()
  const city = document.getElementById('f-city').value.trim()
  const address = document.getElementById('f-address').value.trim()

  if (!arabicName || !englishName || !phone) {
    showMsg('err', 'الاسم بالعربي والإنجليزي والهاتف مطلوبين')
    return
  }

  const btn = document.getElementById('add-btn')
  btn.disabled = true
  btn.textContent = 'جاري الإضافة...'

  try {
    const res = await fetch(`${API}/branches`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ arabicName, englishName, phone, city, address })
    })
    const json = await res.json()
    if (!json.success) throw new Error(json.message || 'فشل')
    showMsg('ok', 'تم إضافة الفرع بنجاح ✓')
    // clear
    ['f-ar','f-en','f-phone','f-city','f-address'].forEach(id => document.getElementById(id).value = '')
    loadBranches()
  } catch(e) {
    showMsg('err', e.message || 'فشل إضافة الفرع')
  } finally {
    btn.disabled = false
    btn.textContent = 'إضافة الفرع'
  }
}

async function deleteBranch(id) {
  if (!confirm('هل تريد حذف هذا الفرع؟')) return
  const card = document.getElementById('bc-' + id)
  if (card) card.style.opacity = '0.4'
  try {
    const res = await fetch(`${API}/branches/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    })
    const json = await res.json()
    if (!json.success) throw new Error()
    loadBranches()
  } catch(e) {
    if (card) card.style.opacity = '1'
    alert('فشل الحذف')
  }
}

function showMsg(type, text) {
  ['err-msg','ok-msg'].forEach(id => { const el = document.getElementById(id); el.classList.remove('show'); el.textContent = '' })
  const el = document.getElementById(type === 'err' ? 'err-msg' : 'ok-msg')
  el.textContent = text
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 4000)
}

function doLogout() {
  localStorage.removeItem('pt_token')
  localStorage.removeItem('pt_user')
  window.location.replace('./login.html')
}

loadBranches()
</script>
</body>
</html>
