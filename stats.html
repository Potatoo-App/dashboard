<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potatoo — التقارير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold-1:#FFCC44; --gold-2:#E08A00;
      --bg:#0E0E0E; --card:#1A1A1A; --item:#222;
      --border:#2E2E2E; --text:#FFF; --sub:rgba(255,255,255,0.5);
      --gold-grad:linear-gradient(180deg,#FFCC44,#E08A00);
      --red:#FF3B30; --green:#30D158; --orange:#FF9500; --blue:#0A84FF;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    #topbar{position:sticky;top:0;z-index:50;background:rgba(14,14,14,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;gap:12px;}
    .logo-sm{width:36px;height:36px;border-radius:10px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .topbar-title{font-size:18px;font-weight:900;flex:1;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .logout-btn{padding:6px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--red);color:var(--red);}

    .page-content{padding:16px 16px 100px;}

    /* PERIOD SELECTOR */
    .period-bar{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
    .period-bar::-webkit-scrollbar{display:none;}
    .period-btn{flex-shrink:0;padding:7px 18px;border-radius:20px;border:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;background:var(--item);color:var(--sub);}
    .period-btn.active{background:var(--gold-grad);color:#000;}

    /* KPI CARDS */
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;text-align:center;}
    .kpi-icon{font-size:28px;margin-bottom:6px;}
    .kpi-val{font-size:22px;font-weight:900;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .kpi-label{font-size:11px;color:var(--sub);font-weight:700;margin-top:4px;}
    .kpi-card.wide{grid-column:1/-1;}

    /* STATUS BREAKDOWN */
    .section-title{font-size:14px;font-weight:900;color:var(--gold-1);margin-bottom:12px;}
    .status-breakdown{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:20px;}
    .status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .status-row:last-child{margin-bottom:0;}
    .status-label{font-size:13px;font-weight:700;width:70px;flex-shrink:0;}
    .status-bar-wrap{flex:1;height:10px;background:var(--item);border-radius:20px;overflow:hidden;}
    .status-bar{height:100%;border-radius:20px;transition:width 1s ease;}
    .bar-new{background:var(--blue);}
    .bar-in_progress{background:var(--orange);}
    .bar-done{background:var(--green);}
    .bar-cancelled{background:var(--red);}
    .status-count{font-size:12px;font-weight:900;color:var(--sub);width:30px;text-align:left;flex-shrink:0;}

    /* TOP ITEMS */
    .top-items{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:20px;}
    .top-item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
    .top-item-row:last-child{border-bottom:none;}
    .rank{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
    .top-item-name{flex:1;font-size:13px;font-weight:700;}
    .top-item-count{font-size:13px;font-weight:900;color:var(--gold-1);}

    /* CHART */
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:20px;overflow:hidden;}
    .chart-title{font-size:13px;font-weight:900;color:var(--gold-1);margin-bottom:14px;}
    .bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bar-fill{width:100%;border-radius:6px 6px 0 0;background:var(--gold-grad);min-height:4px;transition:height 1s ease;}
    .bar-day{font-size:9px;color:var(--sub);font-weight:700;}
    .bar-num{font-size:9px;color:var(--gold-1);font-weight:900;}

    /* LOADER */
    .loader{display:flex;align-items:center;justify-content:center;min-height:200px;gap:12px;}
    .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold-1);border-radius:50%;animation:sp 0.8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,20,0.97);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(12px);z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--sub);font-size:10px;font-weight:700;gap:4px;transition:color 0.2s;}
    .nav-item.active{color:var(--gold-1);}
    .nav-icon{font-size:20px;}
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo-sm">🥔</div>
  <div class="topbar-title">التقارير والإحصائيات</div>
  <button class="logout-btn" onclick="doLogout()">خروج</button>
</div>

<div class="page-content">

  <!-- PERIOD -->
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(this,7)">آخر 7 أيام</button>
    <button class="period-btn" onclick="setPeriod(this,30)">آخر 30 يوم</button>
    <button class="period-btn" onclick="setPeriod(this,90)">آخر 3 شهور</button>
    <button class="period-btn" onclick="setPeriod(this,365)">السنة كلها</button>
  </div>

  <div id="stats-content">
    <div class="loader"><div class="spin"></div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">📊</span>الرئيسية</a>
  <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>الطلبات</a>
  <a href="branches.html" class="nav-item"><span class="nav-icon">🏪</span>الفروع</a>
  <a href="menu.html" class="nav-item"><span class="nav-icon">🍟</span>المنيو</a>
  <a href="stats.html" class="nav-item active"><span class="nav-icon">📈</span>التقارير</a>
</nav>

<script>
const API = 'https://potatoo-eight.vercel.app/api'
const token = localStorage.getItem('pt_token')
if (!token) window.location.replace('./login.html')

let currentDays = 7

async function loadStats() {
  document.getElementById('stats-content').innerHTML = '<div class="loader"><div class="spin"></div></div>'
  try {
    const res = await fetch(`${API}/orders`, { headers: { Authorization: `Bearer ${token}` } })
    if (res.status === 401) { doLogout(); return }
    const json = await res.json()
    const allOrders = json.data || []

    // filter by period
    const cutoff = new Date()
    cutoff.setDate(cutoff.getDate() - currentDays)
    const orders = allOrders.filter(o => new Date(o.createdAt) >= cutoff)

    renderStats(orders, allOrders)
  } catch(e) {
    document.getElementById('stats-content').innerHTML = '<div class="loader" style="color:var(--sub)">فشل التحميل</div>'
  }
}

function renderStats(orders, allOrders) {
  const total = orders.length
  const done = orders.filter(o => o.status === 'done').length
  const cancelled = orders.filter(o => o.status === 'cancelled').length
  const inProgress = orders.filter(o => o.status === 'in_progress').length
  const newOrders = orders.filter(o => o.status === 'new').length
  const revenue = orders.filter(o => o.status === 'done')
    .reduce((s, o) => s + (o.items || []).reduce((ss, i) => ss + (i.price || 0) * i.qty, 0), 0)
  const completionRate = total > 0 ? Math.round((done / total) * 100) : 0

  // top items
  const itemCount = {}
  orders.forEach(o => (o.items || []).forEach(i => {
    const k = i.nameAr || i.nameEn
    itemCount[k] = (itemCount[k] || 0) + i.qty
  }))
  const topItems = Object.entries(itemCount).sort((a,b) => b[1]-a[1]).slice(0,5)

  // daily chart (last N days, max 14 shown)
  const chartDays = Math.min(currentDays, 14)
  const dailyData = []
  for (let i = chartDays - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i)
    const dayStr = d.toLocaleDateString('ar-EG', { weekday: 'short' })
    const dayOrders = orders.filter(o => {
      const od = new Date(o.createdAt)
      return od.toDateString() === d.toDateString()
    }).length
    dailyData.push({ label: dayStr, count: dayOrders })
  }
  const maxDay = Math.max(...dailyData.map(d => d.count), 1)

  const ranks = ['🥇','🥈','🥉','4️⃣','5️⃣']

  document.getElementById('stats-content').innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-icon">📦</div>
        <div class="kpi-val">${total}</div>
        <div class="kpi-label">إجمالي الطلبات</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">✅</div>
        <div class="kpi-val">${done}</div>
        <div class="kpi-label">طلبات مكتملة</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">💰</div>
        <div class="kpi-val">${revenue.toLocaleString()} ج</div>
        <div class="kpi-label">الإيرادات</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">📊</div>
        <div class="kpi-val">${completionRate}%</div>
        <div class="kpi-label">معدل الإنجاز</div>
      </div>
    </div>

    <!-- DAILY CHART -->
    <div class="section-title">📅 الطلبات اليومية</div>
    <div class="chart-card">
      <div class="bar-chart" id="bar-chart">
        ${dailyData.map(d => `
          <div class="bar-col">
            <span class="bar-num">${d.count || ''}</span>
            <div class="bar-fill" style="height:${Math.round((d.count/maxDay)*100)}%"></div>
            <span class="bar-day">${d.label}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- STATUS BREAKDOWN -->
    <div class="section-title">🔍 توزيع حالات الطلبات</div>
    <div class="status-breakdown">
      ${buildStatusRow('🔵 جديد', newOrders, total, 'bar-new')}
      ${buildStatusRow('🟠 جاري', inProgress, total, 'bar-in_progress')}
      ${buildStatusRow('🟢 تم', done, total, 'bar-done')}
      ${buildStatusRow('🔴 ملغي', cancelled, total, 'bar-cancelled')}
    </div>

    <!-- TOP ITEMS -->
    <div class="section-title">🏆 أكثر الأصناف طلباً</div>
    <div class="top-items">
      ${topItems.length ? topItems.map((item, i) => `
        <div class="top-item-row">
          <span class="rank">${ranks[i]}</span>
          <span class="top-item-name">${item[0]}</span>
          <span class="top-item-count">${item[1]} طلب</span>
        </div>
      `).join('') : '<div style="text-align:center;color:var(--sub);padding:20px;font-size:13px;font-weight:700;">لا يوجد بيانات</div>'}
    </div>
  `
}

function buildStatusRow(label, count, total, barClass) {
  const pct = total > 0 ? Math.round((count / total) * 100) : 0
  return `<div class="status-row">
    <span class="status-label">${label}</span>
    <div class="status-bar-wrap">
      <div class="status-bar ${barClass}" style="width:${pct}%"></div>
    </div>
    <span class="status-count">${count}</span>
  </div>`
}

function setPeriod(el, days) {
  currentDays = days
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
  loadStats()
}

function doLogout() {
  localStorage.removeItem('pt_token'); localStorage.removeItem('pt_user')
  window.location.replace('./login.html')
}

loadStats()
</script>
</body>
</html>
