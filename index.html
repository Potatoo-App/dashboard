<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potatoo — الطلبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold-1: #FFCC44; --gold-2: #E08A00;
      --bg: #0E0E0E; --card: #1A1A1A; --item: #222222;
      --border: #2E2E2E; --text: #FFFFFF; --sub: rgba(255,255,255,0.5);
      --gold-grad: linear-gradient(180deg,#FFCC44,#E08A00);
      --red: #FF3B30; --green: #30D158; --orange: #FF9500; --blue: #0A84FF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Cairo',sans-serif; min-height:100vh; }

    /* ===== TOPBAR ===== */
    #topbar {
      position: sticky; top:0; z-index:50;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px; display:flex; align-items:center; gap:12px;
    }
    .logo-sm {
      width:36px; height:36px; border-radius:10px;
      background:var(--gold-grad);
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .topbar-title {
      font-size:18px; font-weight:900; flex:1;
      background:var(--gold-grad);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .topbar-actions { display:flex; align-items:center; gap:8px; }
    .reports-btn {
      padding:6px 14px; border-radius:10px; border:1px solid rgba(255,204,68,0.3);
      background:rgba(255,204,68,0.1); color:var(--gold-1);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s; text-decoration:none;
      display:flex; align-items:center; gap:4px;
    }
    .reports-btn:hover { background:rgba(255,204,68,0.2); }
    .blacklist-btn {
      padding:6px 14px; border-radius:10px; border:1px solid rgba(255,149,0,0.3);
      background:rgba(255,149,0,0.1); color:var(--orange);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
    }
    .blacklist-btn:hover { background:rgba(255,149,0,0.2); }
    .logout-btn {
      padding:6px 14px; border-radius:10px; border:1px solid var(--border);
      background:transparent; color:var(--sub);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
    }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }

    /* ===== BRANCH USER BADGE ===== */
    .branch-user-badge {
      padding: 4px 12px; border-radius:20px;
      background:rgba(10,132,255,0.15); color:var(--blue);
      border:1px solid rgba(10,132,255,0.3);
      font-size:12px; font-weight:900; flex-shrink:0;
    }

    /* ===== BRANCH FILTER ===== */
    .branch-bar {
      padding: 12px 20px 0;
      display:flex; align-items:center; gap:8px;
    }
    .branch-label { font-size:13px; color:var(--sub); font-weight:700; flex-shrink:0; }
    .branch-select {
      padding:6px 12px; border-radius:10px; border:1px solid var(--border);
      background:var(--item); color:var(--text);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      flex:1; max-width:200px;
    }

    /* ===== FILTERS ===== */
    #filters {
      padding: 12px 20px 8px;
      display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
    }
    #filters::-webkit-scrollbar { display:none; }
    .filter-btn {
      flex-shrink:0; padding:7px 18px; border-radius:20px; border:none;
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:900;
      cursor:pointer; transition:all 0.2s;
      background:var(--item); color:var(--sub); white-space:nowrap;
    }
    .filter-btn.active { background:var(--gold-grad); color:#000; }

    /* ===== REFRESH ===== */
    #refresh-bar {
      padding: 0 20px 12px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .orders-count { font-size:13px; color:var(--sub); font-weight:700; }
    .refresh-btn {
      padding:6px 14px; border-radius:10px; border:1px solid var(--border);
      background:transparent; color:var(--sub);
      font-family:'Cairo',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; gap:6px; transition:all 0.2s;
    }
    .refresh-btn:hover { border-color:var(--gold-1); color:var(--gold-1); }
    .refresh-btn.spinning .ref-icon { animation:spin 0.7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ===== LOADER ===== */
    #loader {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:60vh; gap:16px;
    }
    .ld-spinner {
      width:40px; height:40px; border:3px solid var(--border);
      border-top-color:var(--gold-1); border-radius:50%; animation:spin 0.8s linear infinite;
    }
    .ld-text { font-size:14px; color:var(--sub); font-weight:700; }

    /* ===== EMPTY ===== */
    #empty-state {
      display:none; flex-direction:column; align-items:center;
      justify-content:center; min-height:50vh; gap:12px; text-align:center; padding:32px;
    }
    .empty-icon { font-size:56px; }
    .empty-title { font-size:18px; font-weight:900; }
    .empty-sub { font-size:14px; color:var(--sub); }

    /* ===== ORDERS GRID ===== */
    #orders-grid { padding: 0 16px 100px; display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width: 768px)  { #orders-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1200px) { #orders-grid { grid-template-columns: 1fr 1fr 1fr; } }

    /* ===== ORDER CARD ===== */
    .order-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; overflow:hidden;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
      animation: cardIn 0.3s ease both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .order-card.status-new         { border-top:3px solid var(--blue); }
    .order-card.status-in_progress { border-top:3px solid var(--orange); }
    .order-card.status-done        { border-top:3px solid var(--green); }
    .order-card.status-cancelled   { border-top:3px solid var(--red); }

    .card-header {
      padding:14px 16px 10px;
      display:flex; align-items:center; gap:10px;
    }
    .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .status-new .status-dot         { background:var(--blue); box-shadow:0 0 8px var(--blue); }
    .status-in_progress .status-dot { background:var(--orange); box-shadow:0 0 8px var(--orange); }
    .status-done .status-dot        { background:var(--green); }
    .status-cancelled .status-dot   { background:var(--red); }

    .order-num  { font-size:13px; font-weight:900; color:var(--sub); flex:1; }
    .order-time { font-size:11px; color:var(--sub); }
    .branch-tag {
      font-size:11px; font-weight:700; padding:3px 10px;
      border-radius:20px; background:rgba(255,204,68,0.1);
      color:var(--gold-1); border:1px solid rgba(255,204,68,0.2);
    }

    .card-customer { padding:0 16px 12px; display:flex; flex-direction:column; gap:4px; }
    .cust-row  { display:flex; align-items:center; gap:8px; font-size:13px; }
    .cust-icon { font-size:14px; flex-shrink:0; }
    .cust-val  { font-weight:700; }
    .cust-phone { color:var(--gold-1); text-decoration:none; font-weight:900; }

    .card-divider { height:1px; background:var(--border); margin:0 16px; }

    .card-items { padding:12px 16px; }
    .card-items-title { font-size:11px; color:var(--sub); font-weight:700; margin-bottom:8px; }
    .item-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:5px 0; font-size:13px;
    }
    .item-name-wrap { display:flex; align-items:center; gap:6px; }
    .item-qty {
      width:22px; height:22px; border-radius:6px;
      background:var(--gold-grad); color:#000;
      font-size:11px; font-weight:900;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .item-size  { color:var(--sub); font-size:12px; }
    .item-price {
      font-size:12px; font-weight:900;
      background:var(--gold-grad);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    .card-total {
      padding:8px 16px 12px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .total-label { font-size:13px; color:var(--sub); font-weight:700; }
    .total-val {
      font-size:16px; font-weight:900;
      background:var(--gold-grad);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* ===== STATUS BUTTONS ===== */
    .card-actions { padding:12px 16px 16px; display:flex; gap:8px; flex-wrap:wrap; }
    .status-action-btn {
      flex:1; min-width:80px; height:36px; border-radius:12px; border:none;
      font-family:'Cairo',sans-serif; font-size:12px; font-weight:900;
      cursor:pointer; transition:all 0.2s; opacity:0.5;
    }
    .status-action-btn.active-btn { opacity:1; }
    .status-action-btn.btn-new         { background:rgba(10,132,255,0.15); color:var(--blue); border:1px solid rgba(10,132,255,0.3); }
    .status-action-btn.btn-in_progress { background:rgba(255,149,0,0.15); color:var(--orange); border:1px solid rgba(255,149,0,0.3); }
    .status-action-btn.btn-done        { background:rgba(48,209,88,0.15); color:var(--green); border:1px solid rgba(48,209,88,0.3); }
    .status-action-btn.btn-cancelled   { background:rgba(255,59,48,0.15); color:var(--red); border:1px solid rgba(255,59,48,0.3); }
    .status-action-btn.active-btn.btn-new         { background:rgba(10,132,255,0.3); }
    .status-action-btn.active-btn.btn-in_progress { background:rgba(255,149,0,0.3); }
    .status-action-btn.active-btn.btn-done        { background:rgba(48,209,88,0.3); }
    .status-action-btn.active-btn.btn-cancelled   { background:rgba(255,59,48,0.3); }

    .delete-btn {
      width:36px; height:36px; border-radius:12px; border:1px solid rgba(255,59,48,0.3);
      background:rgba(255,59,48,0.1); color:var(--red);
      font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all 0.2s;
    }
    .delete-btn:hover { background:rgba(255,59,48,0.25); }

    .print-btn {
      width:36px; height:36px; border-radius:12px; border:1px solid rgba(10,132,255,0.3);
      background:rgba(10,132,255,0.1); color:var(--blue);
      font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all 0.2s;
    }
    .print-btn:hover { background:rgba(10,132,255,0.25); }

    .block-btn {
      width:36px; height:36px; border-radius:12px; border:1px solid rgba(255,149,0,0.3);
      background:rgba(255,149,0,0.1); color:var(--orange);
      font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all 0.2s;
    }
    .block-btn:hover { background:rgba(255,149,0,0.25); }

    .blocked-banner {
      margin: 0 16px 10px;
      padding: 8px 14px;
      background: rgba(255,59,48,0.12);
      border: 1px solid rgba(255,59,48,0.35);
      border-radius: 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 900; color: var(--red);
    }
    .order-card.status-new.is-blocked,
    .order-card.status-in_progress.is-blocked {
      box-shadow: 0 0 0 2px var(--red), 0 4px 20px rgba(255,59,48,0.3);
    }

    /* ===== BLACKLIST MODAL ===== */
    #bl-modal {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
      align-items:center; justify-content:center; padding:20px;
    }
    #bl-modal.open { display:flex; }
    .bl-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:24px; padding:24px; width:100%; max-width:420px;
    }
    .bl-title { font-size:18px; font-weight:900; margin-bottom:16px; }
    .bl-input {
      width:100%; padding:10px 14px; border-radius:12px; border:1px solid var(--border);
      background:var(--item); color:var(--text);
      font-family:'Cairo',sans-serif; font-size:14px; margin-bottom:12px;
      direction:ltr; text-align:right;
    }
    .bl-add-btn {
      width:100%; height:40px; border-radius:12px; border:none;
      background:var(--gold-grad); color:#000;
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:900;
      cursor:pointer; margin-bottom:16px;
    }
    .bl-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }
    .bl-item {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--item); border-radius:12px; padding:10px 14px;
    }
    .bl-phone { font-size:14px; font-weight:700; direction:ltr; }
    .bl-remove {
      background:rgba(255,59,48,0.15); border:1px solid rgba(255,59,48,0.3);
      color:var(--red); border-radius:8px; padding:4px 10px;
      font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; cursor:pointer;
    }
    .bl-close {
      width:100%; height:40px; border-radius:12px;
      border:1px solid var(--border); background:transparent; color:var(--sub);
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; margin-top:12px;
    }

    /* ===== AUTO REFRESH INDICATOR ===== */
    #auto-badge {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:rgba(30,30,30,0.95); border:1px solid var(--border);
      border-radius:20px; padding:8px 16px;
      font-size:12px; font-weight:700; color:var(--sub);
      display:flex; align-items:center; gap:8px;
      backdrop-filter:blur(8px); z-index:100;
    }
    .pulse-dot {
      width:8px; height:8px; border-radius:50%; background:var(--green);
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo-sm">🥔</div>
  <div class="topbar-title">الطلبات</div>
  <div class="topbar-actions">
    <a class="reports-btn" href="./reports.html">📊 تقارير</a>
    <button class="blacklist-btn" onclick="openBlacklist()">🚫 محظور</button>
    <button class="branch-users-btn" onclick="openBranchUsers()" style="
      padding:6px 14px; border-radius:10px; border:1px solid rgba(48,209,88,0.3);
      background:rgba(48,209,88,0.1); color:var(--green);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
    ">👥 يوزرز</button>
    <button class="logout-btn" onclick="doLogout()">خروج</button>
  </div>
</div>

<!-- BRANCH FILTER -->
<div class="branch-bar">
  <span class="branch-label">الفرع:</span>
  <select class="branch-select" id="branch-select" onchange="setBranchFilter(this.value)">
    <option value="">الكل</option>
  </select>
</div>

<!-- STATUS FILTERS -->
<div id="filters">
  <button class="filter-btn active" data-status="" onclick="setFilter(this,'')">الكل</button>
  <button class="filter-btn" data-status="new" onclick="setFilter(this,'new')">🆕 جديد</button>
  <button class="filter-btn" data-status="in_progress" onclick="setFilter(this,'in_progress')">⏳ جاري</button>
  <button class="filter-btn" data-status="done" onclick="setFilter(this,'done')">✔ مكتمل</button>
  <button class="filter-btn" data-status="cancelled" onclick="setFilter(this,'cancelled')">✖ ملغي</button>
</div>

<!-- REFRESH BAR -->
<div id="refresh-bar">
  <span class="orders-count" id="orders-count">جاري التحميل...</span>
  <button class="refresh-btn" id="refresh-btn" onclick="loadOrders()">
    <span class="ref-icon">↻</span> تحديث
  </button>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="ld-spinner"></div>
  <div class="ld-text">جاري تحميل الطلبات...</div>
</div>

<!-- EMPTY -->
<div id="empty-state">
  <div class="empty-icon">📋</div>
  <div class="empty-title">لا يوجد طلبات</div>
  <div class="empty-sub">الطلبات الجديدة هتظهر هنا</div>
</div>

<!-- ORDERS -->
<div id="orders-grid"></div>

<!-- BLACKLIST MODAL -->
<div id="bl-modal">
  <div class="bl-box">
    <div class="bl-title">🚫 قائمة المحظورين</div>
    <input class="bl-input" id="bl-phone-input" type="tel" placeholder="رقم التليفون" dir="ltr" />
    <button class="bl-add-btn" onclick="addToBlacklist()">+ إضافة للحظر</button>
    <div class="bl-list" id="bl-list"></div>
    <button class="bl-close" onclick="closeBlacklist()">إغلاق</button>
  </div>
</div>

<!-- AUTO REFRESH BADGE -->
<div id="auto-badge">
  <div class="pulse-dot"></div>
  <span id="auto-text">تحديث تلقائي كل 30 ثانية</span>
</div>

<!-- BRANCH USERS MODAL -->
<div id="bu-modal" style="display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--card); border:1px solid var(--border);
    border-radius:24px; padding:24px; width:100%; max-width:440px; max-height:85vh; overflow-y:auto;">
    <div style="font-size:18px; font-weight:900; margin-bottom:16px;">👥 يوزرز الفروع</div>
    <select id="bu-branch-sel" style="width:100%; padding:8px 12px; border-radius:10px;
      border:1px solid var(--border); background:var(--item); color:var(--text);
      font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:8px;">
      <option value="">اختر فرع</option>
    </select>
    <input id="bu-username" placeholder="يوزرنيم" style="width:100%; padding:8px 12px;
      border-radius:10px; border:1px solid var(--border); background:var(--item); color:var(--text);
      font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:8px; direction:ltr; text-align:right;" />
    <input id="bu-password" type="password" placeholder="باسورد" style="width:100%; padding:8px 12px;
      border-radius:10px; border:1px solid var(--border); background:var(--item); color:var(--text);
      font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:8px;" />
    <button onclick="addBranchUser()" style="width:100%; height:40px; border-radius:12px; border:none;
      background:var(--gold-grad); color:#000; font-family:'Cairo',sans-serif;
      font-size:14px; font-weight:900; cursor:pointer; margin-bottom:16px;">+ إضافة يوزر</button>
    <div id="bu-list" style="display:flex; flex-direction:column; gap:8px;"></div>
    <button onclick="closeBranchUsers()" style="width:100%; height:40px; border-radius:12px; margin-top:12px;
      border:1px solid var(--border); background:transparent; color:var(--sub);
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:700; cursor:pointer;">إغلاق</button>
  </div>
</div>

<script>
const API      = 'https://potatoo-eight.vercel.app/api'
const token    = localStorage.getItem('pt_token')
const ptUser   = JSON.parse(localStorage.getItem('pt_user') || '{}')
const isBranch = ptUser.role === 'branch' || ptUser.branchId

if (!token) window.location.replace('./login.html')

let currentFilter = ''
let currentBranch = isBranch ? ptUser.branchId : ''
let allOrders     = []
let myBranches    = []
let autoTimer     = null
let countdown     = 30

const STATUS_LABELS = {
  new:         '🆕',
  in_progress: '⏳',
  done:        '✔',
  cancelled:   '✖',
}

// ============================================================
// BRANCH USERS MANAGEMENT
// ============================================================
async function openBranchUsers() {
  document.getElementById('bu-modal').style.display = 'flex'
  const sel = document.getElementById('bu-branch-sel')
  sel.innerHTML = '<option value="">اختر فرع</option>'
  myBranches.forEach(b => {
    const opt = document.createElement('option')
    opt.value = b._id
    opt.textContent = b.arabicName || b.englishName
    sel.appendChild(opt)
  })
  await renderBranchUsersList()
}

function closeBranchUsers() {
  document.getElementById('bu-modal').style.display = 'none'
}

async function renderBranchUsersList() {
  const list = document.getElementById('bu-list')
  list.innerHTML = '<div style="color:var(--sub);font-size:13px;text-align:center">جاري التحميل...</div>'
  try {
    const res  = await fetch(`${API}/branch-users`, { headers: { Authorization: `Bearer ${token}` } })
    const json = await res.json()
    if (!json.success || !json.data.length) {
      list.innerHTML = '<div style="color:var(--sub);font-size:13px;text-align:center">لا يوجد يوزرز</div>'
      return
    }
    list.innerHTML = json.data.map(u => `
      <div style="display:flex; align-items:center; justify-content:space-between;
        background:var(--item); border-radius:12px; padding:10px 14px;">
        <div>
          <div style="font-size:14px; font-weight:700;">👤 ${u.username}</div>
          <div style="font-size:12px; color:var(--sub);">🏪 ${u.branch?.arabicName || u.branch?.englishName || '—'}</div>
        </div>
        <button onclick="deleteBranchUser('${u._id}')" style="
          background:rgba(255,59,48,0.15); border:1px solid rgba(255,59,48,0.3);
          color:var(--red); border-radius:8px; padding:4px 10px;
          font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; cursor:pointer;">حذف</button>
      </div>`).join('')
  } catch(e) {
    list.innerHTML = '<div style="color:var(--red);font-size:13px">فشل التحميل</div>'
  }
}

async function addBranchUser() {
  const branchId = document.getElementById('bu-branch-sel').value
  const username = document.getElementById('bu-username').value.trim()
  const password = document.getElementById('bu-password').value.trim()
  if (!branchId || !username || !password) { alert('كل الحقول مطلوبة'); return }
  try {
    const res  = await fetch(`${API}/branch-users`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ branchId, username, password })
    })
    const json = await res.json()
    if (json.success) {
      document.getElementById('bu-username').value = ''
      document.getElementById('bu-password').value = ''
      await renderBranchUsersList()
    } else { alert(json.message) }
  } catch(e) { alert('فشل الإضافة') }
}

async function deleteBranchUser(id) {
  if (!confirm('حذف هذا اليوزر؟')) return
  try {
    await fetch(`${API}/branch-users/${id}`, {
      method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
    })
    await renderBranchUsersList()
  } catch(e) { alert('فشل الحذف') }
}

// ============================================================
// LOAD BRANCHES
// ============================================================
async function loadBranches() {
  if (isBranch) {
    document.querySelector('.branch-bar').style.display        = 'none'
    document.querySelector('.branch-users-btn').style.display  = 'none'
    const badge = document.createElement('span')
    badge.className = 'branch-user-badge'
    badge.textContent = '🏪 ' + (ptUser.branchName || 'الفرع')
    document.querySelector('.topbar-actions').prepend(badge)
    document.querySelector('.reports-btn').style.display   = 'none'
    document.querySelector('.blacklist-btn').style.display = 'none'
    return
  }

  try {
    const res  = await fetch(`${API}/restaurant/user-restaurants`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    const json = await res.json()
    if (!json.success) return
    myBranches = json.data?.branches || []
    const sel = document.getElementById('branch-select')
    myBranches.forEach(b => {
      const opt = document.createElement('option')
      opt.value = b._id
      opt.textContent = b.arabicName || b.englishName
      sel.appendChild(opt)
    })
  } catch(e) {}
}

// ============================================================
// LOAD ORDERS
// ============================================================
async function loadOrders() {
  const btn = document.getElementById('refresh-btn')
  btn.classList.add('spinning')
  countdown = 30

  try {
    let url = `${API}/orders?`
    if (currentFilter) url += `status=${currentFilter}&`
    if (currentBranch) url += `branchId=${currentBranch}&`

    const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } })
    if (res.status === 401) { doLogout(); return }

    const json = await res.json()
    if (!json.success) throw new Error()

    allOrders = json.data || []
    renderOrders(allOrders)
  } catch(e) {
    document.getElementById('orders-count').textContent = 'فشل التحميل'
  } finally {
    btn.classList.remove('spinning')
    document.getElementById('loader').style.display = 'none'
  }
}

// ============================================================
// RENDER
// ============================================================
function renderOrders(orders) {
  const grid  = document.getElementById('orders-grid')
  const empty = document.getElementById('empty-state')
  const count = document.getElementById('orders-count')

  count.textContent = `${orders.length} طلب`

  if (orders.length === 0) {
    grid.innerHTML = ''
    empty.style.display = 'flex'
    return
  }
  empty.style.display = 'none'
  grid.innerHTML = orders.map(o => buildCard(o)).join('')
}

function buildCard(o) {
  const branchName = o.branch?.arabicName || o.branch?.englishName || '—'
  const time       = formatTime(o.createdAt)
  const shortId    = o._id.slice(-6).toUpperCase()

  const itemsHtml = (o.items || []).map(item => {
    const price = item.price > 0 ? `${item.price * item.qty} ج` : '—'
    return `<div class="item-row">
      <div class="item-name-wrap">
        <span class="item-qty">${item.qty}</span>
        <span>${item.nameAr}</span>
        <span class="item-size">(${item.sizeKey})</span>
      </div>
      <span class="item-price">${price}</span>
    </div>`
  }).join('')

  const total = (o.items || []).reduce((s, i) => s + (i.price || 0) * i.qty, 0)
  const totalHtml = total > 0
    ? `<div class="card-total">
        <span class="total-label">الإجمالي</span>
        <span class="total-val">${total} ج</span>
       </div>`
    : ''

  const actionBtns = ['new','in_progress','done','cancelled'].map(st => {
    const isActive = o.status === st
    return `<button
      class="status-action-btn btn-${st} ${isActive ? 'active-btn' : ''}"
      onclick="changeStatus('${o._id}','${st}',this)"
      ${isActive ? 'disabled' : ''}>
      ${STATUS_LABELS[st]}
    </button>`
  }).join('')

  const blockedBanner = o.isBlocked
    ? `<div class="blocked-banner">🚫 رقم محظور — ${o.customerPhone}</div>`
    : ''

  return `<div class="order-card status-${o.status} ${o.isBlocked ? 'is-blocked' : ''}" id="card-${o._id}">
    ${blockedBanner}
    <div class="card-header">
      <div class="status-dot"></div>
      <div class="order-num">#${shortId}</div>
      <div class="branch-tag">${branchName}</div>
      <div class="order-time">${time}</div>
    </div>
    <div class="card-customer">
      <div class="cust-row"><span class="cust-icon">👤</span><span class="cust-val">${o.customerName}</span></div>
      <div class="cust-row"><span class="cust-icon">📍</span><span class="cust-val">${o.customerAddress}</span></div>
      <div class="cust-row"><span class="cust-icon">📞</span>
        <a class="cust-phone" href="tel:${o.customerPhone}">${o.customerPhone}</a>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-items">
      <div class="card-items-title">الطلبات</div>
      ${itemsHtml}
    </div>
    ${totalHtml}
    <div class="card-divider"></div>
    <div class="card-actions">
      ${actionBtns}
      <button class="print-btn" onclick="printOrder('${o._id}')" title="طباعة">🖨️</button>
      <button class="block-btn" onclick="blockPhoneQuick('${o.customerPhone}')" title="حظر الرقم">🚫</button>
      <button class="delete-btn" onclick="deleteOrder('${o._id}')" title="حذف">🗑</button>
    </div>
  </div>`
}

// ============================================================
// PRINT ORDER
// ============================================================
function printOrder(orderId) {
  const o = allOrders.find(x => x._id === orderId)
  if (!o) return
  const branchName = o.branch?.arabicName || o.branch?.englishName || '—'
  const itemsRows  = (o.items || []).map(i =>
    `<tr>
      <td>${i.nameAr} (${i.sizeKey})</td>
      <td style="text-align:center">${i.qty}</td>
      <td style="text-align:left">${i.price * i.qty} ج</td>
     </tr>`
  ).join('')
  const total = (o.items || []).reduce((s, i) => s + (i.price || 0) * i.qty, 0)
  const win = window.open('', '_blank')
  win.document.write(`<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <title>طلب #${o._id.slice(-6).toUpperCase()}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; direction: rtl; color: #000; }
    h2 { text-align: center; font-size: 20px; margin-bottom: 4px; }
    .sub { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
    .info { margin-bottom: 16px; font-size: 14px; line-height: 1.8; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th { background: #f0f0f0; padding: 8px; font-size: 13px; border-bottom: 2px solid #ccc; }
    td { padding: 7px 8px; font-size: 13px; border-bottom: 1px solid #eee; }
    .total-row td { font-weight: bold; font-size: 15px; border-top: 2px solid #ccc; }
    @media print { body { padding: 0; } }
  </style>
</head>
<body>
  <h2>🥔 Potatoo</h2>
  <div class="sub">طلب #${o._id.slice(-6).toUpperCase()} — ${new Date(o.createdAt).toLocaleString('ar-EG')}</div>
  <div class="info">
    <b>الفرع:</b> ${branchName}<br/>
    <b>العميل:</b> ${o.customerName}<br/>
    <b>العنوان:</b> ${o.customerAddress}<br/>
    <b>التليفون:</b> ${o.customerPhone}
  </div>
  <table>
    <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th></tr></thead>
    <tbody>${itemsRows}</tbody>
    <tfoot><tr class="total-row"><td colspan="2">الإجمالي</td><td>${total} ج</td></tr></tfoot>
  </table>
  <script>window.onload = () => { window.print(); window.close(); }<\/script>
</body>
</html>`)
  win.document.close()
}

// ============================================================
// BLACKLIST MODAL
// ============================================================
async function openBlacklist() {
  document.getElementById('bl-modal').classList.add('open')
  await renderBlacklist()
}

function closeBlacklist() {
  document.getElementById('bl-modal').classList.remove('open')
}

async function renderBlacklist() {
  const list = document.getElementById('bl-list')
  list.innerHTML = '<div style="color:var(--sub);font-size:13px;text-align:center">جاري التحميل...</div>'
  try {
    const res  = await fetch(`${API}/blacklist`, { headers: { Authorization: `Bearer ${token}` } })
    const json = await res.json()
    if (!json.success || !json.data.length) {
      list.innerHTML = '<div style="color:var(--sub);font-size:13px;text-align:center">لا يوجد أرقام محظورة</div>'
      return
    }
    list.innerHTML = json.data.map(entry => `
      <div class="bl-item">
        <span class="bl-phone">${entry.phone}</span>
        <button class="bl-remove" onclick="removeFromBlacklist('${entry._id}')">إلغاء الحظر</button>
      </div>`).join('')
  } catch(e) {
    list.innerHTML = '<div style="color:var(--red);font-size:13px">فشل التحميل</div>'
  }
}

async function addToBlacklist() {
  const phone = document.getElementById('bl-phone-input').value.trim()
  if (!phone) return
  try {
    const res  = await fetch(`${API}/blacklist`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    })
    const json = await res.json()
    if (json.success) {
      document.getElementById('bl-phone-input').value = ''
      await renderBlacklist()
    } else {
      alert(json.message)
    }
  } catch(e) { alert('فشل الإضافة') }
}

async function removeFromBlacklist(id) {
  try {
    await fetch(`${API}/blacklist/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    })
    await renderBlacklist()
  } catch(e) { alert('فشل الحذف') }
}

async function blockPhoneQuick(phone) {
  if (!confirm(`حظر الرقم ${phone}؟`)) return
  try {
    const res  = await fetch(`${API}/blacklist`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    })
    const json = await res.json()
    alert(json.success ? 'تم الحظر ✅' : json.message)
  } catch(e) { alert('فشل الحظر') }
}

// ============================================================
// CHANGE STATUS
// ============================================================
async function changeStatus(orderId, status, btn) {
  const card = document.getElementById('card-' + orderId)
  if (!card) return

  card.className = `order-card status-${status}`
  card.querySelectorAll('.status-action-btn').forEach(b => {
    const isCurrent = b.classList.contains('btn-' + status)
    b.classList.toggle('active-btn', isCurrent)
    b.disabled = isCurrent
  })

  try {
    const res = await fetch(`${API}/orders/${orderId}/status`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    })
    const json = await res.json()
    if (!json.success) throw new Error()
    const idx = allOrders.findIndex(o => o._id === orderId)
    if (idx !== -1) allOrders[idx].status = status
  } catch(e) {
    loadOrders()
  }
}

// ============================================================
// DELETE ORDER
// ============================================================
async function deleteOrder(orderId) {
  if (!confirm('هل تريد حذف هذا الطلب؟')) return

  const card = document.getElementById('card-' + orderId)
  if (card) card.style.opacity = '0.4'

  try {
    const res = await fetch(`${API}/orders/${orderId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` },
    })
    const json = await res.json()
    if (!json.success) throw new Error()
    allOrders = allOrders.filter(o => o._id !== orderId)
    renderOrders(allOrders)
  } catch(e) {
    if (card) card.style.opacity = '1'
    alert('فشل الحذف، حاول مرة أخرى')
  }
}

// ============================================================
// FILTERS
// ============================================================
function setFilter(el, status) {
  currentFilter = status
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('loader').style.display = 'flex'
  loadOrders()
}

function setBranchFilter(val) {
  currentBranch = val
  loadOrders()
}

// ============================================================
// AUTO REFRESH
// ============================================================
function startAutoRefresh() {
  clearInterval(autoTimer)
  countdown = 30
  autoTimer = setInterval(() => {
    countdown--
    document.getElementById('auto-text').textContent = `تحديث تلقائي خلال ${countdown}ث`
    if (countdown <= 0) {
      loadOrders()
      countdown = 30
    }
  }, 1000)
}

// ============================================================
// LOGOUT
// ============================================================
function doLogout() {
  localStorage.removeItem('pt_token')
  localStorage.removeItem('pt_user')
  window.location.replace('./login.html')
}

// ============================================================
// HELPERS
// ============================================================
function formatTime(iso) {
  if (!iso) return ''
  const d    = new Date(iso)
  const now  = new Date()
  const diff = Math.floor((now - d) / 60000)
  if (diff < 1)    return 'الآن'
  if (diff < 60)   return `منذ ${diff} دقيقة`
  if (diff < 1440) return `منذ ${Math.floor(diff/60)} ساعة`
  return d.toLocaleDateString('ar-EG')
}

// ============================================================
// INIT
// ============================================================
loadBranches()
loadOrders()
startAutoRefresh()
</script>
