<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potatoo — المنيو</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold-1:#FFCC44; --gold-2:#E08A00;
      --bg:#0E0E0E; --card:#1A1A1A; --item:#222;
      --border:#2E2E2E; --text:#FFF; --sub:rgba(255,255,255,0.5);
      --gold-grad:linear-gradient(180deg,#FFCC44,#E08A00);
      --red:#FF3B30; --green:#30D158; --blue:#0A84FF;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    #topbar{position:sticky;top:0;z-index:50;background:rgba(14,14,14,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;gap:12px;}
    .logo-sm{width:36px;height:36px;border-radius:10px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .topbar-title{font-size:18px;font-weight:900;flex:1;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .logout-btn{padding:6px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--red);color:var(--red);}

    .page-content{padding:20px 16px 100px;}
    .section-title{font-size:15px;font-weight:900;color:var(--gold-1);margin-bottom:12px;}

    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:20px;}
    .tab{flex:1;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--item);color:var(--sub);font-family:'Cairo',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;}
    .tab.active{background:var(--gold-grad);color:#000;border-color:transparent;}

    /* FORM */
    .form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;}
    .field input,.field select{width:100%;padding:12px 14px;background:#111;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field select:focus{border-color:var(--gold-1);}
    .field input::placeholder{color:rgba(255,255,255,0.2);}
    .field select option{background:#111;}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

    /* SIZES BUILDER */
    .sizes-wrap{background:#111;border:1.5px solid var(--border);border-radius:12px;padding:12px;}
    .size-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .size-row:last-child{margin-bottom:0;}
    .size-inp{flex:1;padding:8px 10px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;}
    .size-inp:focus{border-color:var(--gold-1);}
    .size-label{font-size:11px;color:var(--sub);font-weight:700;width:50px;text-align:center;}
    .add-size-btn{padding:6px 12px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--sub);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;margin-top:8px;}
    .add-size-btn:hover{border-color:var(--gold-1);color:var(--gold-1);}
    .rm-size{width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,59,48,0.15);color:var(--red);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    .submit-btn{width:100%;height:48px;border-radius:14px;border:none;background:var(--gold-grad);color:#000;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .submit-btn:hover{opacity:0.9;}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

    .msg{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none;text-align:center;}
    .msg.show{display:block;}
    .msg.err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);color:var(--red);}
    .msg.ok{background:rgba(48,209,88,0.1);border:1px solid rgba(48,209,88,0.3);color:var(--green);}

    /* MENU ITEMS GRID */
    .menu-grid{display:flex;flex-direction:column;gap:10px;}
    .menu-item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:cardIn 0.3s ease both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .item-emoji{width:44px;height:44px;border-radius:12px;background:var(--gold-grad);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .item-details{flex:1;min-width:0;}
    .item-name-ar{font-size:14px;font-weight:900;}
    .item-name-en{font-size:11px;color:var(--sub);}
    .item-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
    .size-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,204,68,0.1);color:var(--gold-1);border:1px solid rgba(255,204,68,0.2);}
    .del-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,59,48,0.3);background:rgba(255,59,48,0.1);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
    .del-btn:hover{background:rgba(255,59,48,0.25);}

    .loader{display:flex;align-items:center;justify-content:center;padding:40px;gap:12px;}
    .spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold-1);border-radius:50%;animation:sp 0.8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:40px;color:var(--sub);font-size:14px;font-weight:700;}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,20,0.97);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(12px);z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:var(--sub);font-size:10px;font-weight:700;gap:4px;transition:color 0.2s;}
    .nav-item.active{color:var(--gold-1);}
    .nav-icon{font-size:20px;}

    /* category color dot */
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .cat-main{background:var(--gold-1);}
    .cat-side{background:var(--blue);}
    .cat-drink{background:var(--green);}
    .item-cat{font-size:10px;color:var(--sub);margin-top:2px;}
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo-sm">🥔</div>
  <div class="topbar-title">المنيو</div>
  <button class="logout-btn" onclick="doLogout()">خروج</button>
</div>

<div class="page-content">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'add')">➕ إضافة صنف</button>
    <button class="tab" onclick="switchTab(this,'list')">📋 عرض المنيو</button>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add">
    <div class="form-card">
      <div class="msg err" id="err-msg"></div>
      <div class="msg ok" id="ok-msg"></div>

      <div class="row-2">
        <div class="field">
          <label>الاسم بالعربي</label>
          <input id="m-ar" type="text" placeholder="بطاطس مقلية" />
        </div>
        <div class="field">
          <label>الاسم بالإنجليزي</label>
          <input id="m-en" type="text" placeholder="French Fries" dir="ltr" />
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>الفئة</label>
          <select id="m-cat">
            <option value="main">أكل رئيسي</option>
            <option value="side">إضافات</option>
            <option value="drink">مشروبات</option>
            <option value="dessert">حلويات</option>
          </select>
        </div>
        <div class="field">
          <label>الإيموجي</label>
          <input id="m-emoji" type="text" placeholder="🍟" style="text-align:center;font-size:20px;" />
        </div>
      </div>

      <div class="field">
        <label>المقاسات والأسعار</label>
        <div class="sizes-wrap" id="sizes-wrap">
          <div class="size-row">
            <span class="size-label">اسم المقاس</span>
            <input class="size-inp" type="text" placeholder="صغير" data-size-key />
            <span class="size-label">السعر (ج)</span>
            <input class="size-inp" type="number" placeholder="25" data-size-price min="0" style="width:70px;flex:unset;" />
            <button class="rm-size" onclick="removeSize(this)" style="visibility:hidden;">✕</button>
          </div>
        </div>
        <button class="add-size-btn" onclick="addSizeRow()">+ إضافة مقاس آخر</button>
      </div>

      <button class="submit-btn" id="add-item-btn" onclick="addItem()">إضافة للمنيو</button>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none;">
    <div id="menu-list">
      <div class="loader"><div class="spin"></div></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">📊</span>الرئيسية</a>
  <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>الطلبات</a>
  <a href="branches.html" class="nav-item"><span class="nav-icon">🏪</span>الفروع</a>
  <a href="menu.html" class="nav-item active"><span class="nav-icon">🍟</span>المنيو</a>
  <a href="stats.html" class="nav-item"><span class="nav-icon">📈</span>التقارير</a>
</nav>

<script>
const API = 'https://potatoo-eight.vercel.app/api'
const token = localStorage.getItem('pt_token')
if (!token) window.location.replace('./login.html')

// ---- TABS ----
function switchTab(el, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('tab-add').style.display = name === 'add' ? 'block' : 'none'
  document.getElementById('tab-list').style.display = name === 'list' ? 'block' : 'none'
  if (name === 'list') loadMenu()
}

// ---- SIZES ----
function addSizeRow() {
  const wrap = document.getElementById('sizes-wrap')
  const row = document.createElement('div')
  row.className = 'size-row'
  row.innerHTML = `
    <span class="size-label">اسم المقاس</span>
    <input class="size-inp" type="text" placeholder="وسط" data-size-key />
    <span class="size-label">السعر (ج)</span>
    <input class="size-inp" type="number" placeholder="35" data-size-price min="0" style="width:70px;flex:unset;" />
    <button class="rm-size" onclick="removeSize(this)">✕</button>
  `
  wrap.appendChild(row)
  // show all remove buttons
  wrap.querySelectorAll('.rm-size').forEach(b => b.style.visibility = 'visible')
}

function removeSize(btn) {
  btn.closest('.size-row').remove()
  const rows = document.querySelectorAll('#sizes-wrap .size-row')
  if (rows.length === 1) rows[0].querySelector('.rm-size').style.visibility = 'hidden'
}

// ---- ADD ITEM ----
async function addItem() {
  const nameAr = document.getElementById('m-ar').value.trim()
  const nameEn = document.getElementById('m-en').value.trim()
  const category = document.getElementById('m-cat').value
  const emoji = document.getElementById('m-emoji').value.trim() || '🍟'

  const sizeKeys = [...document.querySelectorAll('[data-size-key]')].map(i => i.value.trim())
  const sizePrices = [...document.querySelectorAll('[data-size-price]')].map(i => parseFloat(i.value) || 0)

  if (!nameAr || !nameEn) { showMsg('err', 'الاسم بالعربي والإنجليزي مطلوبين'); return }
  if (sizeKeys.some(k => !k)) { showMsg('err', 'أدخل اسم كل مقاس'); return }

  const sizes = sizeKeys.map((key, i) => ({ key, price: sizePrices[i] }))

  const btn = document.getElementById('add-item-btn')
  btn.disabled = true; btn.textContent = 'جاري الإضافة...'

  try {
    const res = await fetch(`${API}/menu`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ nameAr, nameEn, category, emoji, sizes })
    })
    const json = await res.json()
    if (!json.success) throw new Error(json.message || 'فشل')
    showMsg('ok', 'تم إضافة الصنف بنجاح ✓')
    document.getElementById('m-ar').value = ''
    document.getElementById('m-en').value = ''
    document.getElementById('m-emoji').value = ''
    // reset sizes
    document.getElementById('sizes-wrap').innerHTML = `
      <div class="size-row">
        <span class="size-label">اسم المقاس</span>
        <input class="size-inp" type="text" placeholder="صغير" data-size-key />
        <span class="size-label">السعر (ج)</span>
        <input class="size-inp" type="number" placeholder="25" data-size-price min="0" style="width:70px;flex:unset;" />
        <button class="rm-size" onclick="removeSize(this)" style="visibility:hidden;">✕</button>
      </div>`
  } catch(e) {
    showMsg('err', e.message || 'فشل الإضافة — تأكد من ربط المنيو بالـ API')
  } finally {
    btn.disabled = false; btn.textContent = 'إضافة للمنيو'
  }
}

// ---- LOAD MENU ----
async function loadMenu() {
  const list = document.getElementById('menu-list')
  list.innerHTML = '<div class="loader"><div class="spin"></div></div>'
  try {
    const res = await fetch(`${API}/menu`, { headers: { Authorization: `Bearer ${token}` } })
    const json = await res.json()
    const items = json.data || []
    if (!items.length) { list.innerHTML = '<div class="empty">لا يوجد أصناف في المنيو</div>'; return }
    list.innerHTML = `<div class="menu-grid">${items.map(item => `
      <div class="menu-item-card" id="mi-${item._id}">
        <div class="item-emoji">${item.emoji || '🍟'}</div>
        <div class="item-details">
          <div class="item-name-ar">${item.nameAr}</div>
          <div class="item-name-en">${item.nameEn}</div>
          <div class="item-cat">${catLabel(item.category)}</div>
          <div class="item-sizes">
            ${(item.sizes || []).map(s => `<span class="size-badge">${s.key} — ${s.price}ج</span>`).join('')}
          </div>
        </div>
        <button class="del-btn" onclick="deleteItem('${item._id}')">🗑</button>
      </div>
    `).join('')}</div>`
  } catch(e) {
    list.innerHTML = '<div class="empty">فشل تحميل المنيو</div>'
  }
}

function catLabel(c) {
  return { main: '🍔 أكل رئيسي', side: '🍟 إضافات', drink: '🥤 مشروبات', dessert: '🍰 حلويات' }[c] || c
}

async function deleteItem(id) {
  if (!confirm('حذف هذا الصنف؟')) return
  const card = document.getElementById('mi-' + id)
  if (card) card.style.opacity = '0.4'
  try {
    const res = await fetch(`${API}/menu/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } })
    const json = await res.json()
    if (!json.success) throw new Error()
    loadMenu()
  } catch(e) {
    if (card) card.style.opacity = '1'
    alert('فشل الحذف')
  }
}

function showMsg(type, text) {
  ['err-msg','ok-msg'].forEach(id => { const el = document.getElementById(id); el.classList.remove('show'); el.textContent = '' })
  const el = document.getElementById(type === 'err' ? 'err-msg' : 'ok-msg')
  el.textContent = text; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 4000)
}

function doLogout() {
  localStorage.removeItem('pt_token'); localStorage.removeItem('pt_user')
  window.location.replace('./login.html')
}
</script>
</body>
</html>
